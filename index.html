<!-- FULL PROFESSIONAL BILINGUAL CLOUD VERSION -->
<!-- SAVE AS index.html -->

<!DOCTYPE html>
<html lang="mk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NA-NAU Meeting Management</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Segoe UI,sans-serif;
background:#f1f5f9;
color:#0f172a;
}

.app{
max-width:1400px;
margin:auto;
padding:20px;
}

.header{
background:white;
padding:20px;
border-radius:20px;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:20px;
margin-bottom:20px;
box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.logo{
font-size:28px;
font-weight:700;
color:#003399;
}

.userPanel{
display:flex;
gap:10px;
align-items:center;
flex-wrap:wrap;
}

.tabs{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

.tab{
background:white;
padding:12px 18px;
border-radius:12px;
cursor:pointer;
font-weight:600;
border:2px solid transparent;
}

.tab.active{
border-color:#003399;
color:#003399;
}

.card{
background:white;
padding:20px;
border-radius:20px;
margin-bottom:20px;
box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.btn{
padding:10px 16px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:600;
}

.btnPrimary{
background:#003399;
color:white;
}

.btnDanger{
background:#dc2626;
color:white;
}

.btnWarn{
background:#f59e0b;
color:white;
}

.btnGray{
background:#e2e8f0;
}

.input{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #cbd5e1;
margin-top:5px;
margin-bottom:15px;
}

textarea.input{
min-height:120px;
resize:vertical;
}

.grid2{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.meeting{
padding:18px;
border:1px solid #cbd5e1;
border-radius:16px;
margin-bottom:15px;
background:#f8fafc;
}

.meetingTitle{
font-size:20px;
font-weight:700;
color:#003399;
margin-bottom:10px;
}

.meta{
font-size:14px;
color:#475569;
margin-bottom:10px;
}

.actions{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-top:15px;
}

.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:10px;
}

.day{
background:#f8fafc;
border:1px solid #cbd5e1;
border-radius:12px;
padding:10px;
min-height:120px;
}

.dayNum{
font-weight:700;
margin-bottom:10px;
}

.event{
background:#dbeafe;
padding:5px;
border-radius:8px;
font-size:12px;
margin-top:5px;
}

.login{
max-width:450px;
margin:60px auto;
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 2px 15px rgba(0,0,0,.1);
}

.center{
text-align:center;
}

.employee{
padding:15px;
border:1px solid #cbd5e1;
border-radius:14px;
margin-bottom:10px;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:10px;
}

.notification{
padding:15px;
background:#eff6ff;
border-left:4px solid #003399;
border-radius:10px;
margin-bottom:10px;
}

@media(max-width:768px){

.grid2{
grid-template-columns:1fr;
}

.calendar{
grid-template-columns:repeat(2,1fr);
}

}

</style>
</head>

<body>

<div id="app"></div>

<script>

/* =========================
CONFIG
========================= */

const API_URL = "https://script.google.com/macros/s/AKfycbwJezz96mzdi4ar8yq9FTETc_LsbGqp2kEMT58Vtp-SnGVt1rD9LDR8feLpIO4x4aBI/exec";

/* =========================
LANGUAGE
========================= */

let lang = "mk";

const tr = {

mk:{
meetings:"Состаноци",
newMeeting:"Нов состанок",
calendar:"Календар",
archive:"Архива",
employees:"Вработени",
notifications:"Нотификации",
logout:"Одјава",
login:"Најава",
email:"Е-пошта",
password:"Лозинка",
title:"Наслов",
date:"Датум",
time:"Време",
location:"Локација",
attendees:"Присутни",
agenda:"Дневен ред",
minutes:"Записник",
decisions:"Заклучоци",
save:"Зачувај",
edit:"Уреди",
delete:"Избриши",
archiveBtn:"Архивирај",
export:"Export",
addUser:"Додади корисник"
},

en:{
meetings:"Meetings",
newMeeting:"New Meeting",
calendar:"Calendar",
archive:"Archive",
employees:"Employees",
notifications:"Notifications",
logout:"Logout",
login:"Login",
email:"Email",
password:"Password",
title:"Title",
date:"Date",
time:"Time",
location:"Location",
attendees:"Attendees",
agenda:"Agenda",
minutes:"Minutes",
decisions:"Decisions",
save:"Save",
edit:"Edit",
delete:"Delete",
archiveBtn:"Archive",
export:"Export",
addUser:"Add User"
}

};

function t(k){
return tr[lang][k] || k;
}

/* =========================
USERS
========================= */

const USERS = [

{
id:1,
name:"Дарко Димитров",
position:"Администратор",
email:"admin@na.org.mk",
password:"12345",
isAdmin:true
},

{
id:2,
name:"Гоце Величковски",
position:"Раководител",
email:"goce.velichkovski@na.org.mk",
password:"abcd",
isAdmin:false
},

{
id:3,
name:"Катерина Стружан",
position:"Помошник раководител",
email:"katerina.struzan-cvetkovska@mon.gov.mk",
password:"abcd",
isAdmin:false
}

];

/* =========================
STATE
========================= */

let currentUser = null;
let meetings = [];
let notifications = [];
let currentTab = "meetings";
let editId = null;

/* =========================
API
========================= */

async function apiGet(action){

try{

const res = await fetch(API_URL + "?action=" + action + "&t=" + Date.now());

return await res.json();

}catch(err){

console.log(err);

return {success:false};

}

}

async function apiPost(action,data){

try{

await fetch(API_URL + "?action=" + action,{
method:"POST",
body:JSON.stringify(data),
headers:{
"Content-Type":"application/json"
},
mode:"no-cors"
});

return {success:true};

}catch(err){

console.log(err);

return {success:false};

}

}

/* =========================
LOAD
========================= */

async function loadMeetings(){

const data = await apiGet("getMeetings");

if(data.success){

meetings = data.meetings || [];

}

render();

}

/* =========================
LOGIN
========================= */

function login(){

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

const user = USERS.find(u =>
u.email === email &&
u.password === password
);

if(!user){

alert("Wrong credentials");

return;

}

currentUser = user;

loadMeetings();

render();

}

function logout(){

currentUser = null;

render();

}

/* =========================
SAVE
========================= */

async function saveMeeting(){

const meeting = {

id: editId || Date.now(),

title_mk:document.getElementById("title_mk").value,
title_en:document.getElementById("title_en").value,

date:document.getElementById("date").value,
time:document.getElementById("time").value,

location:document.getElementById("location").value,

attendees:document.getElementById("attendees").value,

agenda_mk:document.getElementById("agenda_mk").value,
agenda_en:document.getElementById("agenda_en").value,

minutes_mk:document.getElementById("minutes_mk").value,
minutes_en:document.getElementById("minutes_en").value,

decisions_mk:document.getElementById("decisions_mk").value,
decisions_en:document.getElementById("decisions_en").value,

archived:false

};

await apiPost("saveMeeting",meeting);

editId = null;

currentTab = "meetings";

await loadMeetings();

}

/* =========================
DELETE
========================= */

async function deleteMeeting(id){

if(!confirm("Delete?")) return;

await apiPost("deleteMeeting",{id});

await loadMeetings();

}

/* =========================
EDIT
========================= */

function editMeeting(id){

const m = meetings.find(x => x.id == id);

if(!m) return;

editId = id;

currentTab = "new";

render();

setTimeout(()=>{

document.getElementById("title_mk").value = m.title_mk || "";
document.getElementById("title_en").value = m.title_en || "";

document.getElementById("date").value = m.date || "";
document.getElementById("time").value = m.time || "";

document.getElementById("location").value = m.location || "";

document.getElementById("attendees").value = m.attendees || "";

document.getElementById("agenda_mk").value = m.agenda_mk || "";
document.getElementById("agenda_en").value = m.agenda_en || "";

document.getElementById("minutes_mk").value = m.minutes_mk || "";
document.getElementById("minutes_en").value = m.minutes_en || "";

document.getElementById("decisions_mk").value = m.decisions_mk || "";
document.getElementById("decisions_en").value = m.decisions_en || "";

},100);

}

/* =========================
ARCHIVE
========================= */

async function archiveMeeting(id){

const m = meetings.find(x => x.id == id);

if(!m) return;

m.archived = true;

await apiPost("saveMeeting",m);

await loadMeetings();

}

/* =========================
EXPORT
========================= */

function exportMeeting(id){

const m = meetings.find(x => x.id == id);

if(!m) return;

const html = `
<html>
<body>

<h1>${lang==="mk" ? m.title_mk : m.title_en}</h1>

<p><b>${t("date")}:</b> ${m.date}</p>
<p><b>${t("time")}:</b> ${m.time}</p>
<p><b>${t("location")}:</b> ${m.location}</p>

<h2>${t("agenda")}</h2>
<p>${lang==="mk" ? m.agenda_mk : m.agenda_en}</p>

<h2>${t("minutes")}</h2>
<p>${lang==="mk" ? m.minutes_mk : m.minutes_en}</p>

<h2>${t("decisions")}</h2>
<p>${lang==="mk" ? m.decisions_mk : m.decisions_en}</p>

</body>
</html>
`;

const blob = new Blob([html],{
type:"application/msword"
});

const a = document.createElement("a");

a.href = URL.createObjectURL(blob);

a.download = "meeting.doc";

a.click();

}

/* =========================
CALENDAR
========================= */

function renderCalendar(){

const now = new Date();

const year = now.getFullYear();

const month = now.getMonth();

const days = new Date(year,month+1,0).getDate();

let html = `
<div class="card">

<h2 style="margin-bottom:20px;">
${t("calendar")}
</h2>

<div class="calendar">
`;

for(let i=1;i<=days;i++){

const date =
year + "-" +
String(month+1).padStart(2,"0") + "-" +
String(i).padStart(2,"0");

const dayMeetings = meetings.filter(m => m.date === date && !m.archived);

html += `
<div class="day">
<div class="dayNum">${i}</div>
`;

dayMeetings.forEach(m=>{

html += `
<div class="event">
${lang==="mk" ? m.title_mk : m.title_en}
</div>
`;

});

html += `</div>`;

}

html += `
</div>
</div>
`;

return html;

}

/* =========================
RENDER
========================= */

function render(){

const app = document.getElementById("app");

if(!currentUser){

app.innerHTML = `
<div class="login">

<h1 class="center" style="margin-bottom:20px;">
NA-NAU
</h1>

<label>${t("email")}</label>
<input class="input" id="email">

<label>${t("password")}</label>
<input class="input" type="password" id="password">

<button class="btn btnPrimary" style="width:100%;margin-top:10px;" onclick="login()">
${t("login")}
</button>

<div style="margin-top:20px;text-align:center;">

<button class="btn btnGray" onclick="lang='mk';render()">
🇲🇰 MK
</button>

<button class="btn btnGray" onclick="lang='en';render()">
🇬🇧 EN
</button>

</div>

</div>
`;

return;

}

let content = "";

/* meetings */

if(currentTab==="meetings"){

content += `
<div class="card">

<h2 style="margin-bottom:20px;">
${t("meetings")}
</h2>
`;

meetings
.filter(m => !m.archived)
.forEach(m=>{

content += `
<div class="meeting">

<div class="meetingTitle">
${lang==="mk" ? m.title_mk : m.title_en}
</div>

<div class="meta">
📅 ${m.date}
⏰ ${m.time}
📍 ${m.location}
</div>

<div class="actions">

<button class="btn btnPrimary" onclick="editMeeting('${m.id}')">
${t("edit")}
</button>

<button class="btn btnWarn" onclick="archiveMeeting('${m.id}')">
${t("archiveBtn")}
</button>

<button class="btn btnPrimary" onclick="exportMeeting('${m.id}')">
${t("export")}
</button>

<button class="btn btnDanger" onclick="deleteMeeting('${m.id}')">
${t("delete")}
</button>

</div>

</div>
`;

});

content += `</div>`;

}

/* new */

if(currentTab==="new"){

content = `
<div class="card">

<h2 style="margin-bottom:20px;">
${t("newMeeting")}
</h2>

<div class="grid2">

<div>
<label>${t("title")} MK</label>
<input class="input" id="title_mk">
</div>

<div>
<label>${t("title")} EN</label>
<input class="input" id="title_en">
</div>

<div>
<label>${t("date")}</label>
<input type="date" class="input" id="date">
</div>

<div>
<label>${t("time")}</label>
<input type="time" class="input" id="time">
</div>

</div>

<label>${t("location")}</label>
<input class="input" id="location">

<label>${t("attendees")}</label>
<input class="input" id="attendees">

<label>${t("agenda")} MK</label>
<textarea class="input" id="agenda_mk"></textarea>

<label>${t("agenda")} EN</label>
<textarea class="input" id="agenda_en"></textarea>

<label>${t("minutes")} MK</label>
<textarea class="input" id="minutes_mk"></textarea>

<label>${t("minutes")} EN</label>
<textarea class="input" id="minutes_en"></textarea>

<label>${t("decisions")} MK</label>
<textarea class="input" id="decisions_mk"></textarea>

<label>${t("decisions")} EN</label>
<textarea class="input" id="decisions_en"></textarea>

<button class="btn btnPrimary" onclick="saveMeeting()">
${t("save")}
</button>

</div>
`;

}

/* calendar */

if(currentTab==="calendar"){

content = renderCalendar();

}

/* archive */

if(currentTab==="archive"){

content = `
<div class="card">

<h2 style="margin-bottom:20px;">
${t("archive")}
</h2>
`;

meetings
.filter(m => m.archived)
.forEach(m=>{

content += `
<div class="meeting">

<div class="meetingTitle">
${lang==="mk" ? m.title_mk : m.title_en}
</div>

<div class="meta">
📅 ${m.date}
</div>

</div>
`;

});

content += `</div>`;

}

app.innerHTML = `
<div class="app">

<div class="header">

<div class="logo">
NA-NAU
</div>

<div class="userPanel">

<button class="btn btnGray" onclick="lang='mk';render()">
🇲🇰
</button>

<button class="btn btnGray" onclick="lang='en';render()">
🇬🇧
</button>

<div>
${currentUser.name}
</div>

<button class="btn btnDanger" onclick="logout()">
${t("logout")}
</button>

</div>

</div>

<div class="tabs">

<div class="tab ${currentTab==="meetings"?"active":""}"
onclick="currentTab='meetings';render();">
${t("meetings")}
</div>

<div class="tab ${currentTab==="new"?"active":""}"
onclick="currentTab='new';render();">
${t("newMeeting")}
</div>

<div class="tab ${currentTab==="calendar"?"active":""}"
onclick="currentTab='calendar';render();">
${t("calendar")}
</div>

<div class="tab ${currentTab==="archive"?"active":""}"
onclick="currentTab='archive';render();">
${t("archive")}
</div>

</div>

${content}

</div>
`;

}

render();

</script>

</body>
</html>
