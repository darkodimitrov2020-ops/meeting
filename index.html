<!DOCTYPE html>
<html lang="mk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NA-NAU Meeting Management</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Segoe UI,sans-serif;
background:#f1f5f9;
color:#0f172a;
}

.app{
max-width:1200px;
margin:auto;
padding:20px;
}

.header{
background:white;
padding:20px;
border-radius:16px;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:15px;
margin-bottom:20px;
box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.title{
font-size:24px;
font-weight:700;
color:#003399;
}

.tabs{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

.tab{
padding:10px 18px;
border:none;
border-radius:30px;
background:white;
cursor:pointer;
font-weight:600;
}

.tab.active{
background:#003399;
color:white;
}

.card{
background:white;
padding:20px;
border-radius:16px;
margin-bottom:15px;
box-shadow:0 2px 8px rgba(0,0,0,.06);
}

.meeting{
border:1px solid #e2e8f0;
padding:15px;
border-radius:12px;
margin-bottom:12px;
}

.meeting-title{
font-size:18px;
font-weight:700;
color:#003399;
margin-bottom:8px;
}

.meta{
font-size:13px;
color:#64748b;
margin-bottom:10px;
}

.actions{
display:flex;
gap:8px;
flex-wrap:wrap;
}

.btn{
padding:8px 14px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:600;
}

.primary{
background:#003399;
color:white;
}

.danger{
background:#ef4444;
color:white;
}

.warning{
background:#f59e0b;
color:white;
}

input,textarea{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:15px;
border:1px solid #cbd5e1;
border-radius:10px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:10px;
margin-top:20px;
}

.day{
background:white;
border:1px solid #e2e8f0;
border-radius:12px;
padding:10px;
min-height:100px;
}

.day.today{
border:2px solid #003399;
background:#dbeafe;
}

.day-number{
font-weight:700;
margin-bottom:8px;
}

.event{
background:#003399;
color:white;
padding:4px 6px;
border-radius:6px;
font-size:11px;
margin-top:5px;
cursor:pointer;
}

.login{
max-width:420px;
margin:60px auto;
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 2px 10px rgba(0,0,0,.08);
}

@media(max-width:700px){
.grid{
grid-template-columns:1fr;
}

.calendar{
grid-template-columns:repeat(2,1fr);
}
}
</style>
</head>

<body>

<div id="app"></div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbx2t8ThiCR9tId1bFkwKrpffS_TdmO0AkOUtMrMibThktjLxlk2inQurGdR949QjRtn/exec";

const USERS=[
{
id:1,
name:"Дарко Димитров",
email:"darko.dimitrov@na.org.mk",
password:"12345",
position:"Раководител",
isAdmin:true
},
{
id:2,
name:"Ана Михајлов",
email:"ana.mihajlov@na.org.mk",
password:"abcd",
position:"Директор",
isAdmin:false
}
];

let meetings=[];
let currentUser=null;
let currentTab="meetings";
let editId=null;

let calendarMonth=new Date().getMonth();
let calendarYear=new Date().getFullYear();

function escapeHtml(str){
return (str||"")
.replace(/&/g,"&amp;")
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;");
}

async function apiGet(action){
try{
const res=await fetch(API_URL+"?action="+action+"&t="+Date.now());
return await res.json();
}catch(e){
return {success:false};
}
}

async function apiPost(action,data){
try{
await fetch(API_URL+"?action="+action,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(data)
});
return {success:true};
}catch(e){
return {success:false};
}
}

async function loadMeetings(){

if(API_URL==="YOUR_GOOGLE_SCRIPT_URL"){
meetings=JSON.parse(localStorage.getItem("meetings")||"[]");
render();
return;
}

const data=await apiGet("getMeetings");

if(data.success){
meetings=data.meetings||[];
}else{
meetings=[];
}

render();
}

async function saveMeetingData(meeting){

if(API_URL==="YOUR_GOOGLE_SCRIPT_URL"){
let existing=meetings.findIndex(m=>m.id===meeting.id);

if(existing>-1){
meetings[existing]=meeting;
}else{
meetings.push(meeting);
}

localStorage.setItem("meetings",JSON.stringify(meetings));
render();
return;
}

await apiPost("saveMeeting",meeting);
loadMeetings();
}

async function deleteMeetingData(id){

if(API_URL==="YOUR_GOOGLE_SCRIPT_URL"){
meetings=meetings.filter(m=>m.id!==id);
localStorage.setItem("meetings",JSON.stringify(meetings));
render();
return;
}

await apiPost("deleteMeeting",{id});
loadMeetings();
}

function login(){

const email=document.getElementById("email").value;
const password=document.getElementById("password").value;

const user=USERS.find(u=>u.email===email&&u.password===password);

if(!user){
alert("Погрешни податоци");
return;
}

currentUser=user;
render();
}

function logout(){
currentUser=null;
render();
}

function openNew(){
editId=null;
currentTab="new";
render();
}

function editMeeting(id){

const m=meetings.find(x=>x.id===id);

if(!m)return;

editId=id;
currentTab="new";

render();

setTimeout(()=>{
document.getElementById("title").value=m.title||"";
document.getElementById("date").value=m.date||"";
document.getElementById("time").value=m.time||"";
document.getElementById("location").value=m.location||"";
document.getElementById("agenda").value=m.agenda||"";
},50);
}

async function saveMeeting(){

const meeting={
id:editId||Date.now(),
title:document.getElementById("title").value,
date:document.getElementById("date").value,
time:document.getElementById("time").value,
location:document.getElementById("location").value,
agenda:document.getElementById("agenda").value
};

await saveMeetingData(meeting);

currentTab="meetings";
editId=null;
}

async function removeMeeting(id){

if(!confirm("Избриши?"))return;

await deleteMeetingData(id);
}

function exportMeeting(id){

const m=meetings.find(x=>x.id===id);

const html=`
<h1>${escapeHtml(m.title)}</h1>
<p>${m.date}</p>
<p>${m.location}</p>
<p>${escapeHtml(m.agenda)}</p>
`;

const blob=new Blob([html],{
type:"application/msword"
});

const a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="meeting.doc";
a.click();
}

function renderCalendar(){

const firstDay=new Date(calendarYear,calendarMonth,1).getDay();
const daysInMonth=new Date(calendarYear,calendarMonth+1,0).getDate();

let html=`
<div class="card">

<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
<button class="btn" onclick="prevMonth()">◀</button>
<h2>${calendarMonth+1}/${calendarYear}</h2>
<button class="btn" onclick="nextMonth()">▶</button>
</div>

<div class="calendar">
`;

for(let i=0;i<firstDay;i++){
html+=`<div class="day"></div>`;
}

for(let d=1;d<=daysInMonth;d++){

const dateStr=
calendarYear+"-"+
String(calendarMonth+1).padStart(2,"0")+"-"+
String(d).padStart(2,"0");

const today=new Date();

const isToday=
today.getDate()===d &&
today.getMonth()===calendarMonth &&
today.getFullYear()===calendarYear;

const dayMeetings=meetings.filter(m=>m.date===dateStr);

html+=`
<div class="day ${isToday?"today":""}">
<div class="day-number">${d}</div>
`;

dayMeetings.forEach(m=>{
html+=`
<div class="event" onclick="editMeeting(${m.id})">
${escapeHtml(m.title)}
</div>
`;
});

html+=`</div>`;
}

html+=`</div></div>`;

return html;
}

function prevMonth(){
calendarMonth--;

if(calendarMonth<0){
calendarMonth=11;
calendarYear--;
}

render();
}

function nextMonth(){
calendarMonth++;

if(calendarMonth>11){
calendarMonth=0;
calendarYear++;
}

render();
}

function renderMeetings(){

let html=`
<div class="card">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
<h2>📋 Состаноци</h2>
<button class="btn primary" onclick="openNew()">➕ Нов</button>
</div>
`;

if(!meetings.length){
html+=`Нема состаноци`;
}

meetings.forEach(m=>{

html+=`
<div class="meeting">

<div class="meeting-title">
${escapeHtml(m.title)}
</div>

<div class="meta">
📅 ${m.date} |
⏰ ${m.time} |
📍 ${escapeHtml(m.location)}
</div>

<div class="actions">
<button class="btn" onclick="editMeeting(${m.id})">✏️ Edit</button>
<button class="btn primary" onclick="exportMeeting(${m.id})">📄 Export</button>
<button class="btn danger" onclick="removeMeeting(${m.id})">🗑️ Delete</button>
</div>

</div>
`;

});

html+=`</div>`;

return html;
}

function renderForm(){

return `
<div class="card">

<h2 style="margin-bottom:20px;">
${editId?"✏️ Уреди":"➕ Нов состанок"}
</h2>

<label>Наслов</label>
<input id="title">

<div class="grid">

<div>
<label>Датум</label>
<input type="date" id="date">
</div>

<div>
<label>Време</label>
<input type="time" id="time" value="10:00">
</div>

</div>

<label>Локација</label>
<input id="location">

<label>Дневен ред</label>
<textarea id="agenda"></textarea>

<div class="actions">
<button class="btn primary" onclick="saveMeeting()">💾 Save</button>
<button class="btn" onclick="currentTab='meetings';render()">Cancel</button>
</div>

</div>
`;
}

function render(){

const app=document.getElementById("app");

if(!currentUser){

app.innerHTML=`
<div class="login">

<h1 style="margin-bottom:20px;color:#003399;">
NA-NAU Login
</h1>

<label>Email</label>
<input id="email">

<label>Password</label>
<input type="password" id="password">

<button class="btn primary" style="width:100%;" onclick="login()">
Login
</button>

</div>
`;

return;
}

let content="";

if(currentTab==="meetings"){
content=renderMeetings();
}

if(currentTab==="new"){
content=renderForm();
}

if(currentTab==="calendar"){
content=renderCalendar();
}

app.innerHTML=`
<div class="app">

<div class="header">

<div>
<div class="title">
NA-NAU Meeting Management
</div>
<div>
${currentUser.name}
</div>
</div>

<button class="btn danger" onclick="logout()">
Logout
</button>

</div>

<div class="tabs">

<button class="tab ${currentTab==="meetings"?"active":""}"
onclick="currentTab='meetings';render()">
Meetings
</button>

<button class="tab ${currentTab==="calendar"?"active":""}"
onclick="currentTab='calendar';render()">
Calendar
</button>

<button class="tab ${currentTab==="new"?"active":""}"
onclick="openNew()">
New Meeting
</button>

</div>

${content}

</div>
`;
}

loadMeetings();

</script>

</body>
</html>
